plugins {
    id 'application'
}

repositories {
    mavenCentral()
}

dependencies {
    // LangChain4j
    implementation 'dev.langchain4j:langchain4j:0.36.2'
    implementation 'dev.langchain4j:langchain4j-open-ai:0.36.2'

    // Playwright for headless browser
    implementation 'com.microsoft.playwright:playwright:1.49.0'

    // Jsoup for HTML cleaning
    implementation 'org.jsoup:jsoup:1.17.2'

    // JSON
    implementation 'com.google.code.gson:gson:2.11.0'

    // Logging
    implementation 'org.slf4j:slf4j-api:2.0.16'
    implementation 'org.slf4j:slf4j-simple:2.0.16'

    // Testing
    testImplementation 'org.junit.jupiter:junit-jupiter:5.10.3'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
    testImplementation 'org.mockito:mockito-core:5.14.2'
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

application {
    mainClass = 'com.scraper.App'
}

tasks.named('test') {
    useJUnitPlatform()
}

tasks.register('installPlaywright', JavaExec) {
    classpath = sourceSets.main.runtimeClasspath
    mainClass = 'com.microsoft.playwright.CLI'
    args = ['install', 'chromium']
}

tasks.named('run') {
    dependsOn 'installPlaywright'
    systemProperties System.getProperties()
    environment System.getenv()
    jvmArgs = ['-Djava.locale.providers=COMPAT,CLDR']
}

tasks.register('installPlaywrightDeps', Exec) {
    commandLine 'sh', '-c', 'npx playwright install-deps chromium 2>/dev/null || true'
    ignoreExitValue = true
}
